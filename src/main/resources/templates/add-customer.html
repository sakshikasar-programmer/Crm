<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Customer - CRM</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            position: relative;
        }

        .logout {
            position: absolute;
            right: 20px;
            top: 15px;
        }

        .logout a {
            color: white;
            text-decoration: none;
            background: red;
            padding: 8px 12px;
            border-radius: 5px;
        }

        .sidebar {
            width: 200px;
            height: 100vh;
            background: #34495e;
            position: fixed;
            top: 0;
            left: 0;
            padding-top: 60px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 12px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #1abc9c;
        }

        .content {
            margin-left: 200px;
            padding: 20px;
        }

        .form-card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 400px;
        }

        .form-card h2 {
            margin-bottom: 20px;
        }

        .form-card input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .btn {
            padding: 10px 15px;
            border-radius: 5px;
            border: none;
            color: white;
            cursor: pointer;
        }

        .save-btn {
            background: #27ae60;
        }

        .back-btn {
            background: gray;
            text-decoration: none;
            padding: 10px 15px;
            color: white;
            border-radius: 5px;
            margin-left: 10px;
        }
    </style>
</head>

<body>

<!-- Header -->
<div class="header">
    <h2>Customer Management</h2>
    <div class="logout">
        <a href="/logout">Logout</a>
    </div>
</div>

<!-- Sidebar -->
<div class="sidebar">
    <a href="/dashboard">Dashboard</a>
    <a href="/customers">Customers</a>
    <a href="/leads">Leads</a>
    <a href="/sales">Sales</a>
    <a href="/reports">Reports</a>
</div>

<!-- Content -->
<div class="content">

    <div class="form-card">
        <h2 th:text="${customer.id == null} ? '➕ Add Customer' : '✏️ Edit Customer'"></h2>

        <form action="/save-customer" method="post">
            <input type="hidden" name="id" th:value="${customer.id}">

            <input type="text" name="name" placeholder="Enter Name"
                   th:value="${customer.name}" required>

            <input type="email" name="email" placeholder="Enter Email"
                   th:value="${customer.email}" required>

            <input type="text" name="phone" placeholder="Enter Phone"
                   th:value="${customer.phone}" required>

            <input type="text" name="city" placeholder="Enter City"
                   th:value="${customer.city}" required>

            <button type="submit" class="btn save-btn">Save</button>
            <a href="/customers" class="back-btn">Back</a>
        </form>
    </div>

</div>

</body>
</html>
