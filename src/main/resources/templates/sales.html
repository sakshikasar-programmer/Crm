<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sales - CRM</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial;
            background: #f4f6f9;
        }

        .header {
            background: linear-gradient(90deg, #2c3e50, #4ca1af);
            color: white;
            padding: 15px;
            text-align: center;
            position: relative;
            font-size: 20px;
            letter-spacing: 1px;
        }

        .logout {
            position: absolute;
            right: 20px;
            top: 15px;
        }

        .logout a {
            color: white;
            text-decoration: none;
            background: #e74c3c;
            padding: 8px 12px;
            border-radius: 5px;
        }

        .sidebar {
            width: 220px;
            height: 100vh;
            background: #34495e;
            position: fixed;
            top: 0;
            left: 0;
            padding-top: 70px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 14px;
            text-decoration: none;
            font-size: 15px;
        }

        .sidebar a:hover {
            background: #1abc9c;
        }

        .content {
            margin-left: 220px;
            padding: 25px;
        }

        /* Cards */
        .cards {
            display: flex;
            flex-wrap: wrap;
        }

        .card {
            flex: 1;
            min-width: 200px;
            margin: 10px;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            margin-bottom: 10px;
            color: #555;
        }

        .highlight {
            font-size: 22px;
            font-weight: bold;
            color: #27ae60;
        }

        /* Button */
        .add-btn {
            margin-top: 20px;
            display: inline-block;
            background: #27ae60;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 5px;
        }

        .add-btn:hover {
            background: #219150;
        }

        /* Table */
        table {
            width: 100%;
            margin-top: 30px;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        th {
            background: #2c3e50;
            color: white;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        tr:hover {
            background: #ecf0f1;
        }

        /* Status */
        .status {
            padding: 6px 12px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
        }

        .completed {
            background: #2ecc71;
        }

        .pending {
            background: #f39c12;
        }

        /* Action Buttons */
        .action-btn {
            padding: 6px 12px;
            border-radius: 5px;
            text-decoration: none;
            color: white;
            font-size: 13px;
            margin: 2px;
            display: inline-block;
        }

        .edit {
            background: #3498db;
        }

        .edit:hover {
            background: #2980b9;
        }

        .delete {
            background: #e74c3c;
        }

        .delete:hover {
            background: #c0392b;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .cards {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

<div class="header">
    💰 Sales Dashboard
    <div class="logout">
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="sidebar">
    <a href="/dashboard">Dashboard</a>
    <a href="/customers">Customers</a>
    <a href="/leads">Leads</a>
    <a href="/sales">Sales</a>
    <a href="/reports">Reports</a>
</div>

<div class="content">

    <h2>📊 Sales Overview</h2>

    <!-- Cards -->
    <div class="cards">
        <div class="card">
            <h3>Total Sales</h3>
            <p class="highlight" th:text="'₹ ' + ${totalSales}"></p>
        </div>

        <div class="card">
            <h3>Total Orders</h3>
            <p class="highlight" th:text="${orders}"></p>
        </div>

        <div class="card">
            <h3>Completed Deals</h3>
            <p class="highlight" th:text="${completed}"></p>
        </div>

        <div class="card">
            <h3>Pending Deals</h3>
            <p class="highlight" th:text="${pending}"></p>
        </div>
    </div>

    <!-- Add Button -->
    <a href="/add-sale" class="add-btn">+ Add Sale</a>

    <!-- Table -->
    <h2>Recent Sales</h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Customer</th>
            <th>Product</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Action</th>
        </tr>

        <tr th:each="sale : ${sales}" th:if="${sale != null}">
            <td th:text="${sale.id}"></td>
            <td th:text="${sale.customer}"></td>
            <td th:text="${sale.product}"></td>
            <td th:text="'₹ ' + ${sale.amount}"></td>

            <td>
                <span class="status"
                      th:text="${sale.status}"
                      th:classappend="${sale.status == 'COMPLETED'} ? 'completed' : 'pending'">
                </span>
            </td>

            <td>
                <a th:href="@{/edit-sale/{id}(id=${sale.id})}" 
                   class="action-btn edit">✏️ Edit</a>

                <a th:href="@{/delete-sale/{id}(id=${sale.id})}" 
                   class="action-btn delete"
                   onclick="return confirm('Are you sure to delete this sale?')">
                   🗑️ Delete
                </a>
            </td>
        </tr>
    </table>

</div>

</body>
</html>
