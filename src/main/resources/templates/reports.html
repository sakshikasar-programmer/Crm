<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Reports - CRM</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            position: relative;
        }

        .logout {
            position: absolute;
            right: 20px;
            top: 15px;
        }

        .logout a {
            color: white;
            text-decoration: none;
            background: red;
            padding: 8px 12px;
            border-radius: 5px;
        }

        .sidebar {
            width: 200px;
            height: 100vh;
            background: #34495e;
            position: fixed;
            top: 0;
            left: 0;
            padding-top: 60px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 12px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #1abc9c;
        }

        .content {
            margin-left: 200px;
            padding: 20px;
        }

        .card {
            display: inline-block;
            width: 220px;
            padding: 20px;
            margin: 10px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .highlight {
            color: #e67e22;
            font-size: 20px;
            font-weight: bold;
        }

        .filters {
            margin-top: 20px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 5px gray;
        }

        .filters input, .filters select {
            padding: 8px;
            margin: 5px;
        }

        .filters button {
            padding: 8px 12px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        table {
            width: 100%;
            margin-top: 30px;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 0 5px gray;
        }

        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #2c3e50;
            color: white;
        }

        .no-data {
            text-align: center;
            padding: 20px;
            color: gray;
        }
    </style>

</head>

<body>

<div class="header">
    <h2>Reports & Analytics</h2>
    <div class="logout">
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="sidebar">
    <a href="/dashboard">Dashboard</a>
    <a href="/customers">Customers</a>
    <a href="/leads">Leads</a>
    <a href="/sales">Sales</a>
    <a href="/reports">Reports</a>
</div>

<div class="content">

    <h2>📊 Business Reports</h2>

    <!-- Cards -->
    <div class="card">
        <h3>Total Revenue</h3>
        <p class="highlight">₹ <span th:text="${revenue}"></span></p>
    </div>

    <div class="card">
        <h3>Total Customers</h3>
        <p class="highlight" th:text="${customers}"></p>
    </div>

    <div class="card">
        <h3>Total Leads</h3>
        <p class="highlight" th:text="${leads}"></p>
    </div>

    <div class="card">
        <h3>Conversion Rate</h3>
        <p class="highlight" th:text="${rate} + '%'"></p>
    </div>

  </body>
</html>
